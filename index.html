<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아르케 영어 도우미</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f7fb; color: #1f2937; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 18px; }
    .hero, .card { background: #fff; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); padding: 18px; margin-bottom: 16px; }
    h1 { margin: 0 0 8px; font-size: 30px; }
    h2 { margin: 0 0 10px; font-size: 22px; }
    .sub { color: #6b7280; line-height: 1.6; font-size: 14px; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    label { display: block; margin: 10px 0 6px; font-weight: 700; font-size: 14px; color: #374151; }
    input, textarea {
      width: 100%; border: 1px solid #d1d5db; border-radius: 12px; padding: 12px; font-size: 15px; outline: none;
    }
    textarea { min-height: 120px; resize: vertical; line-height: 1.6; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    button {
      border: none; border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 700; cursor: pointer;
      background: #0f766e; color: white;
    }
    button.secondary { background: #475569; }
    .output {
      margin-top: 14px; padding: 14px; border-radius: 14px; background: #f8fafc; border: 1px solid #e5e7eb;
      white-space: pre-wrap; line-height: 1.7; min-height: 120px;
    }
    .ok { color: #166534; }
    .err { color: #b91c1c; }
    .badge {
      display: inline-block; padding: 5px 10px; border-radius: 999px; background: #ecfeff; color: #115e59;
      font-size: 12px; font-weight: 700; margin-bottom: 10px;
    }
    .small { font-size: 12px; color: #6b7280; line-height: 1.6; margin-top: 8px; }
    .hidden { display: none; }
    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: #475569;
      font-size: 14px;
      font-weight: 700;
    }
    .check-row input {
      width: auto;
      margin: 0;
    }
    .center-card {
      max-width: 540px;
      margin: 40px auto;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      padding: 22px;
    }
  </style>
</head>
<body>
  <div id="gateScreen" class="wrap">
    <div class="center-card">
      <div class="badge">입장 비밀번호</div>
      <h1>아르케 영어 도우미</h1>
      <div class="sub">
        비밀번호를 입력해야 사용할 수 있습니다.
      </div>
      <label for="sitePassword">비밀번호</label>
      <input id="sitePassword" type="password" placeholder="비밀번호를 입력하세요" />
      <label class="check-row" for="rememberPassword">
        <input id="rememberPassword" type="checkbox" />
        <span>이 기기에 비밀번호 저장</span>
      </label>
      <div class="row">
        <button onclick="enterSite()">입장하기</button>
      </div>
      <div id="gateOutput" class="output">여기에 안내 문구가 표시됩니다.</div>
      <div class="small">
        비밀번호가 맞아야 들어갈 수 있습니다.
      </div>
    </div>
  </div>

  <div id="appScreen" class="wrap hidden">
    <div class="hero">
      <h1>아르케 영어 도우미</h1>
      <div class="sub">
        학생용 최종 버전입니다.<br>
        1) 단어 뜻 찾기 + 발음 듣기<br>
        2) 문장 넣으면 틀린 부분, 가능한 올바른 문장 여러 개, 차이까지 알려주기
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="badge">기능 1</div>
        <h2>단어 뜻 + 발음</h2>
        <label for="wordInput">영단어</label>
        <input id="wordInput" type="text" placeholder="example" />
        <div class="row">
          <button onclick="lookupWord()">뜻 찾기</button>
          <button class="secondary" onclick="speakWord()">발음 듣기</button>
        </div>
        <div id="wordOutput" class="output">여기에 뜻, 품사, 예문이 표시됩니다.</div>
      </div>

      <div class="card">
        <div class="badge">기능 2</div>
        <h2>문장 오류 점검</h2>
        <label for="sentenceInput">영문장 입력</label>
        <textarea id="sentenceInput" placeholder="He go to school yesterday."></textarea>
        <div class="row">
          <button onclick="checkSentence()">문장 검사</button>
          <button class="secondary" onclick="copyResult('sentenceOutput')">결과 복사</button>
        </div>
        <div id="sentenceOutput" class="output">여기에 틀린 부분, 이유, 가능한 올바른 문장, 차이가 표시됩니다.</div>
      </div>
    </div>
  </div>

<script>
let siteUnlocked = false;
const SAVED_PASSWORD_KEY = 'arche-helper-saved-password-v1';

function showApp() {
  document.getElementById('gateScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
}

function loadRememberedPassword() {
  try {
    return localStorage.getItem(SAVED_PASSWORD_KEY) || '';
  } catch (e) {
    return '';
  }
}

function saveRememberedPassword(password) {
  try {
    if (document.getElementById('rememberPassword').checked) {
      localStorage.setItem(SAVED_PASSWORD_KEY, password);
    } else {
      localStorage.removeItem(SAVED_PASSWORD_KEY);
    }
  } catch (e) {
    // Private browsing or strict browser settings can block localStorage.
  }
}

async function enterSite() {
  const pw = document.getElementById('sitePassword').value.trim();
  const out = document.getElementById('gateOutput');
  if (!pw) {
    out.innerHTML = '<span class="err">비밀번호를 입력하세요.</span>';
    return;
  }

  out.textContent = '확인 중...';

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });

    const data = await res.json();
    if (!res.ok) {
      out.innerHTML = '<span class="err">' + escapeHtml(data.error || '비밀번호 확인 실패') + '</span>';
      return;
    }

    if (data.ok) {
      siteUnlocked = true;
      saveRememberedPassword(pw);
      out.innerHTML = '<span class="ok">입장 성공</span>';
      showApp();
    } else {
      out.innerHTML = '<span class="err">비밀번호가 틀렸습니다.</span>';
    }
  } catch (e) {
    out.innerHTML = '<span class="err">서버 연결 중 오류가 발생했습니다.</span>';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const savedPassword = loadRememberedPassword();
  if (savedPassword) {
    document.getElementById('sitePassword').value = savedPassword;
    document.getElementById('rememberPassword').checked = true;
    enterSite();
  }
});

function getPasswordOrThrow() {
  if (!siteUnlocked) {
    throw new Error('먼저 비밀번호를 입력해야 합니다.');
  }

  return document.getElementById('sitePassword').value.trim();
}

function getWordCacheKey(word) {
  return 'arke-word-cache-v2:' + String(word || '').trim().toLowerCase();
}

function readWordCache(word) {
  try {
    const raw = localStorage.getItem(getWordCacheKey(word));
    if (!raw) return '';
    const parsed = JSON.parse(raw);
    return parsed && parsed.result ? parsed.result : '';
  } catch (e) {
    return '';
  }
}

function writeWordCache(word, result) {
  try {
    localStorage.setItem(getWordCacheKey(word), JSON.stringify({
      result,
      savedAt: Date.now()
    }));
  } catch (e) {
    // ignore cache write failures
  }
}

function normalizeSentenceText(text) {
  return String(text || '').trim().replace(/\s+/g, ' ').toLowerCase();
}

function getSentenceCacheKey(text) {
  return 'arke-sentence-cache-v1:' + normalizeSentenceText(text);
}

function readSentenceCache(text) {
  try {
    const raw = localStorage.getItem(getSentenceCacheKey(text));
    if (!raw) return '';
    const parsed = JSON.parse(raw);
    return parsed && parsed.result ? parsed.result : '';
  } catch (e) {
    return '';
  }
}

function writeSentenceCache(text, result) {
  try {
    localStorage.setItem(getSentenceCacheKey(text), JSON.stringify({
      result,
      savedAt: Date.now()
    }));
  } catch (e) {
    // ignore cache write failures
  }
}

function toIngForm(verb) {
  const lower = String(verb || '').toLowerCase();
  const special = {
    run: 'running',
    swim: 'swimming',
    sit: 'sitting',
    stop: 'stopping',
    make: 'making',
    write: 'writing',
    come: 'coming',
    take: 'taking',
    have: 'having',
    study: 'studying',
  };
  if (special[lower]) return special[lower];
  if (lower.endsWith('e')) return lower.slice(0, -1) + 'ing';
  return lower + 'ing';
}

function toThirdPersonForm(verb) {
  const lower = String(verb || '').toLowerCase();
  const special = { have: 'has', do: 'does', go: 'goes' };
  if (special[lower]) return special[lower];
  if (lower.endsWith('y') && !/[aeiou]y$/.test(lower)) return lower.slice(0, -1) + 'ies';
  if (/(s|x|ch|sh|o)$/.test(lower)) return lower + 'es';
  return lower + 's';
}

function getQuickSentenceResult(text) {
  const original = String(text || '').trim().replace(/\s+/g, ' ');
  const lower = original.toLowerCase().replace(/[.?!]+$/g, '');
  const commonVerbs = 'swim|go|eat|play|study|run|walk|sleep|read|write|speak|make|do|have|take|come|see|watch|listen|drink';

  const beVerbMatch = lower.match(new RegExp('^(i|you|he|she|it|we|they)\\s+(am|is|are|was|were)\\s+(' + commonVerbs + ')(\\s+.*)?$'));
  if (beVerbMatch) {
    const subject = beVerbMatch[1];
    const beVerb = beVerbMatch[2];
    const verb = beVerbMatch[3];
    const rest = beVerbMatch[4] || '';
    const subjectText = subject.charAt(0).toUpperCase() + subject.slice(1);
    const progressive = `${subjectText} ${beVerb} ${toIngForm(verb)}${rest}.`;
    const simple = `${subjectText} ${verb}${rest}.`;

    return `빠른 검사 결과
1) 맞는 문장인지 먼저 말하기
틀린 문장입니다.

2) 틀린 부분
"${beVerb} ${verb}" 부분이 어색합니다.

3) 왜 틀렸는지
"${beVerb}"는 be동사이고, "${verb}"도 일반동사 원형입니다. 영어에서는 보통 동사 역할을 하는 말이 이렇게 바로 두 개 붙으면 안 됩니다.

4) 한국어로 직역하면 왜 어색한지
"나는 ${verb}하다이다"처럼 들려서 자연스럽지 않습니다.

5) 가능한 올바른 문장
- 지금 하고 있는 동작이면: ${progressive}
- 평소에 하는 일이나 사실이면: ${simple}

6) 문장들 사이의 차이
be동사 + -ing는 "지금 하고 있다"는 느낌이고, 일반동사만 쓰면 "평소에 한다/사실이다"는 느낌입니다.

7) 다음에 기억할 규칙
be동사 뒤에 일반동사를 바로 쓰려면 보통 동사에 -ing를 붙입니다.`;
  }

  const wantMatch = lower.match(new RegExp('\\b(want|wants|wanted)\\s+(' + commonVerbs + ')\\b'));
  if (wantMatch) {
    const wantVerb = wantMatch[1];
    const nextVerb = wantMatch[2];
    const fixed = original.replace(new RegExp('\\b' + wantVerb + '\\s+' + nextVerb + '\\b', 'i'), `${wantVerb} to ${nextVerb}`);

    return `빠른 검사 결과
1) 맞는 문장인지 먼저 말하기
틀린 문장입니다.

2) 틀린 부분
"${wantVerb} ${nextVerb}" 부분에서 "to"가 빠졌습니다.

3) 왜 틀렸는지
want 뒤에 다른 동작을 말할 때는 보통 "want to + 동사원형"을 씁니다.

4) 한국어로 직역하면 왜 어색한지
"원한다 가다"처럼 말이 이어져서 자연스럽지 않습니다.

5) 가능한 올바른 문장
- ${fixed.endsWith('.') ? fixed : fixed + '.'}

6) 문장들 사이의 차이
"want to"는 "~하고 싶다"라는 뜻을 만드는 묶음입니다.

7) 다음에 기억할 규칙
want 다음에 행동이 나오면 "want to 동사원형"을 먼저 떠올리세요.`;
  }

  const thirdPersonMatch = lower.match(new RegExp('^(he|she|it)\\s+(' + commonVerbs + ')(\\s+.*)?$'));
  if (thirdPersonMatch) {
    const subject = thirdPersonMatch[1];
    const verb = thirdPersonMatch[2];
    const rest = thirdPersonMatch[3] || '';
    const subjectText = subject.charAt(0).toUpperCase() + subject.slice(1);
    const fixedVerb = toThirdPersonForm(verb);

    return `빠른 검사 결과
1) 맞는 문장인지 먼저 말하기
틀린 문장일 가능성이 큽니다.

2) 틀린 부분
"${subject} ${verb}" 부분을 확인해야 합니다.

3) 왜 틀렸는지
현재 시제에서 주어가 he, she, it이면 일반동사에 보통 -s 또는 -es를 붙입니다.

4) 한국어로 직역하면 왜 어색한지
뜻은 통하지만, 영어 문법에서는 주어와 동사의 모양이 맞지 않습니다.

5) 가능한 올바른 문장
- ${subjectText} ${fixedVerb}${rest}.

6) 문장들 사이의 차이
"${verb}"는 I/you/we/they에 더 잘 맞고, "${fixedVerb}"는 he/she/it에 맞습니다.

7) 다음에 기억할 규칙
현재 시제에서 he/she/it 뒤 일반동사는 s를 확인하세요.`;
  }

  return '';
}

async function callWordApi(text) {
  const password = getPasswordOrThrow();
  const res = await fetch('/api/word', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, password })
  });

  let data = {};
  try {
    data = await res.json();
  } catch (e) {
    throw new Error('응답 해석에 실패했습니다.');
  }

  if (!res.ok) {
    throw new Error(data.error || '단어 조회 중 서버 오류가 발생했습니다.');
  }

  return data.result || '응답이 없습니다.';
}

async function callSentenceApi(text) {
  const password = getPasswordOrThrow();
  const res = await fetch('/api/ai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ mode: 'sentence', text, password })
  });

  let data = {};
  try {
    data = await res.json();
  } catch (e) {
    throw new Error('응답 해석에 실패했습니다.');
  }

  if (!res.ok) {
    throw new Error(data.error || '서버 오류가 발생했습니다.');
  }

  return data.result || '응답이 없습니다.';
}

async function lookupWord() {
  const word = document.getElementById('wordInput').value.trim();
  const out = document.getElementById('wordOutput');
  if (!word) {
    out.textContent = '단어를 입력하세요.';
    return;
  }

  const cached = readWordCache(word);
  if (cached) {
    out.textContent = cached;
    return;
  }

  out.textContent = '뜻을 찾는 중...';
  try {
    const result = await callWordApi(word);
    writeWordCache(word, result);
    out.textContent = result;
  } catch (e) {
    out.innerHTML = '<span class="err">' + escapeHtml(e.message) + '</span>';
  }
}

function speakWord() {
  const word = document.getElementById('wordInput').value.trim();
  const out = document.getElementById('wordOutput');
  if (!word) {
    out.textContent = '발음을 들을 단어를 입력하세요.';
    return;
  }
  if (!('speechSynthesis' in window)) {
    out.innerHTML = '<span class="err">이 브라우저는 발음 기능을 지원하지 않습니다.</span>';
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.9;
  window.speechSynthesis.speak(utter);
}

async function checkSentence() {
  const text = document.getElementById('sentenceInput').value.trim();
  const out = document.getElementById('sentenceOutput');
  if (!text) {
    out.textContent = '문장을 입력하세요.';
    return;
  }

  const cached = readSentenceCache(text);
  if (cached) {
    out.textContent = cached;
    return;
  }

  const quickResult = getQuickSentenceResult(text);
  if (quickResult) {
    writeSentenceCache(text, quickResult);
    out.textContent = quickResult;
    return;
  }

  out.textContent = 'AI 문장 검사 중... 처음 검사하는 문장은 몇 초 걸릴 수 있습니다.';
  try {
    const result = await callSentenceApi(text);
    writeSentenceCache(text, result);
    out.textContent = result;
  } catch (e) {
    out.innerHTML = '<span class="err">' + escapeHtml(e.message) + '</span>';
  }
}

async function copyResult(id) {
  const text = document.getElementById(id).innerText.trim();
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    alert('복사되었습니다.');
  } catch {
    alert('복사에 실패했습니다.');
  }
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}
</script>
</body>
</html>
